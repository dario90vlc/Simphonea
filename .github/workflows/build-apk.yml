name: Build Simphonea APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create simphonea_app com.simphonea.app Simphonea
          cd simphonea_app
          cordova platform add android
          rm -rf www/*
          cp ../DISEÑO.HTML www/index.html
          cp ../manifest.json www/manifest.json
          cp ../config.xml config.xml
          # El config.xml ahora incluye los permisos RECORD_AUDIO nativos.
          
      - name: Build Android APK (Debug)
        run: |
          cd simphonea_app
          cordova build android --debug -- --packageType=apk
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../output/Simphonea.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Simphonea-Binary
          path: output/Simphonea.apk
